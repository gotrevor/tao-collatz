name = "TaoCollatz"
defaultTargets = ["TaoCollatz"]

# Warnings-as-errors (standing preference: warnings "are there for a reason"), so a finished
# result stays clean. `weak.` keeps this out of the build trace, so flipping it forces no
# rebuild — meaning a warm local tree stays silent and CI, which always builds fresh, is what
# actually enforces it. Comparator opts out per-file in Challenge.lean (statements there are
# `sorry` by design); removing that opt-out fails the harness build.
[leanOptions]
weak.warningAsError = true

# Mathlib pinned as a DIRECT require at v4.31.0 (matches the ~/.lake-base/4.31.0 universe
# store, so `lake-base link` CoW-clones the prebuilt oleans in — no 40-min cold build).
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4.git"
rev = "v4.31.0"

[[lean_lib]]
name = "TaoCollatz"

# comparator harness — deliberately NOT in defaultTargets (challenge files carry
# `sorry` by design and the main lib builds warnings-as-errors). Build explicitly
# with `lake build Comparator`; the real gate is .github/workflows/comparator.yml.
[[lean_lib]]
name = "Comparator"
globs = ["Comparator.+"]
